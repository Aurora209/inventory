<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>汇率工具 - 库存管理系统</title><link rel="stylesheet" href="/static/assets/css/styles.css?v=2026062304" /></head>
<body>
  <header class="site-header"><div class="header-content"><div><h1>汇率换算</h1><p>实时汇率看板、金额换算与历史走势参考</p></div><div class="status" id="page-status">准备加载...</div></div></header>
  <nav class="main-nav" id="main-nav"></nav>
  <main class="layout main-content exchange-rate-page">
    <section class="section"><div class="section-header"><h3>今日实时汇率</h3><div class="last-update">最后更新：<span id="fx-last-update">-</span> <button id="refresh-rates" class="btn btn-secondary btn-sm">🔄 刷新</button></div></div><div class="rates-grid" id="rates-grid"></div></section>
    <section class="section"><div class="section-header"><h3>汇率转换</h3><label class="filters compact">选择日期 <input class="input" id="fx-date" type="date" /></label></div><div class="converter-container"><article class="converter-form"><div class="form-group"><label>金额：</label><input class="amount-input" id="fx-amount" type="number" value="100" step="any" min="0" /></div><div class="form-row"><div class="form-group"><label>从货币：</label><select class="currency-select" id="fx-from"></select></div><div class="swap-button"><button id="fx-swap" class="btn-swap" type="button" title="交换货币">⇄</button></div><div class="form-group"><label>转换为：</label><select class="currency-select" id="fx-to"></select></div></div><div class="conversion-result"><label>转换结果：</label><div class="result-value" id="fx-result">-</div><p class="rate-info" id="fx-rate-info"></p></div></article><article class="conversion-history"><h4>最近转换记录</h4><div id="fx-history" class="history-list"></div></article></div></section>
    <section class="section"><div class="section-header"><h3>历史汇率查询</h3><div class="filters compact"><select id="history-currency"></select><input class="input" id="history-start" type="date" /><input class="input" id="history-end" type="date" /><button id="load-history" class="btn btn-primary" type="button">查询历史</button></div></div><div id="history-summary" class="stats-grid"></div><div class="table-container"><table class="data-table"><thead><tr><th>日期</th><th>兑人民币汇率</th><th>涨跌</th></tr></thead><tbody id="history-body"></tbody></table></div><p class="message">汇率优先尝试公开接口，失败时自动使用内置参考数据；实际交易请以银行实时牌价为准。</p></section>
  </main>
  <footer class="page-footer"><div class="footer-content"><p>&copy; 2025 库存管理系统. 保留所有权利.</p><div class="footer-links"><a href="javascript:void(0)">隐私政策</a><a href="javascript:void(0)">使用条款</a><a href="javascript:void(0)">联系我们</a></div></div></footer>
  <script type="module" src="/static/assets/js/exchange-rate.js?v=2026062302"></script>
</body>
</html>
