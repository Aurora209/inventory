<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>销售订单 - 库存管理系统</title>
  <link rel="stylesheet" href="/static/assets/css/styles.css?v=2026062304" />
</head>
<body class="order-page sales">
  <header class="site-header">
    <div class="header-content">
      <div>
        <h1>销售订单</h1>
        <p>销售订单、客户交付与开票流程管理</p>
      </div>
      <div class="status" id="page-status">准备加载...</div>
    </div>
  </header>
  <nav class="main-nav" id="main-nav"></nav>

  <main class="layout main-content">
    <section class="grid two-col">
      <article class="card order-summary-card stat-card">
        <div class="stat-icon">📋</div><div><p id="stat-total-orders" class="order-highlight stat-value">-</p><p class="stat-label">销售订单总数</p></div>
      </article>
      <article class="card order-summary-card stat-card">
        <div class="stat-icon">⏳</div><div><p id="stat-pending-orders" class="order-highlight stat-value">-</p><p class="stat-label">待发货销售单</p></div>
      </article>
      <article class="card order-summary-card stat-card">
        <div class="stat-icon">✅</div><div><p id="stat-completed-orders" class="order-highlight stat-value">-</p><p class="stat-label">已交付销售单</p></div>
      </article>
      <article class="card order-summary-card stat-card">
        <div class="stat-icon">💰</div><div><p id="stat-total-amount" class="order-highlight stat-value">-</p><p class="stat-label">销售总金额</p></div>
      </article>
    </section>

    <div class="modal-overlay fullscreen" id="create-order-section" style="display:none;">
      <div class="modal-content purchase-order-modal" style="width:100vw; height:100vh; max-width:none; max-height:none; border-radius:0; overflow:hidden; ">
        <div class="modal-header purchase-order-modal-header">
          <h3>创建销售订单</h3>
          <button id="close-create-order-section" type="button" class="modal-close" aria-label="关闭">×</button>
        </div>
        <div class="modal-body purchase-order-modal-body">
          <label class="purchase-order-field">
            <span>订单号 *</span>
            <input class="input" id="create-order-number-display" type="text" placeholder="不填则自动生成，可手动输入订单号" />
          </label>
          <label class="purchase-order-field">
            <span>客户名称 *</span>
            <input class="input" id="create-customer-supplier" type="text" placeholder="输入客户名称" />
          </label>
          <label class="purchase-order-field">
            <span>订单日期 *</span>
            <input class="input" id="create-order-date" type="date" />
          </label>
          <label class="purchase-order-field">
            <span>卖家自定义信息</span>
            <textarea class="input" id="create-notes" placeholder="输入备注信息"></textarea>
          </label>

          <input class="input" id="create-seller-name" type="hidden" />
          <input class="input" id="create-seller-phone" type="hidden" />
          <input class="input" id="create-seller-address" type="hidden" />
          <input class="input" id="create-seller-taxno" type="hidden" />
          <input class="input" id="create-seller-note" type="hidden" />

          <div class="purchase-order-items-card">
            <h4>订单明细</h4>
            <div class="table-container purchase-order-items-table">
              <table class="data-table">
                <thead><tr><th>产品名称</th><th>SKU</th><th>单价</th><th>单位</th><th>数量</th><th>金额</th><th>操作</th></tr></thead>
                <tbody id="create-order-items-body"></tbody>
              </table>
            </div>
            <button id="add-order-item-row" type="button" class="btn btn-secondary">添加明细</button>
          </div>

          <label class="purchase-order-field">
            <span>快递运费(¥)</span>
            <input class="input" id="create-shipping-cost" type="number" min="0" step="0.01" value="0" placeholder="0" />
          </label>
          <label class="purchase-order-field">
            <span>订单总金额</span>
            <div class="purchase-order-total" id="create-order-total-display">¥0.00</div>
          </label>
          <label class="purchase-order-field">
            <span>状态</span>
            <select id="create-order-status-display" disabled>
              <option value="pending">待处理</option>
            </select>
          </label>

          <p class="message" id="create-order-message"></p>
        </div>
        <div class="purchase-order-modal-actions">
          <button id="cancel-create-order-section" type="button" class="btn btn-secondary">取消</button>
          <button id="create-order-button" class="btn btn-primary">创建订单</button>
        </div>
      </div>
    </div>

    <section class="section order-list-section" style="margin-top:16px;">
      <div id="order-detail-panel" class="card" style="display:none; margin-bottom:16px;">
        <div class="section-header">
          <h3>销售订单详情</h3>
          <button id="close-order-detail" class="btn btn-secondary btn-sm">关闭</button>
        </div>
        <div id="order-detail-content"></div>
        <div class="form-actions" style="justify-content:flex-start;">
          <button id="edit-current-order-button" class="btn btn-primary">编辑销售订单</button>
          <button id="print-current-order-button" class="btn btn-info">打印销售单</button>
          <button id="open-packing-list-button" class="btn btn-secondary">查看装箱单</button>
        </div>
      </div>

      <div id="edit-order-panel" class="card" style="display:none; margin-bottom:16px;">
        <div class="section-header">
          <h3>编辑销售订单</h3>
          <button id="close-edit-order" class="btn btn-secondary btn-sm">关闭</button>
        </div>
        <div class="filters edit-order-field-grid">
          <label class="order-edit-field"><span>客户名称 *</span><input class="input" id="edit-customer-supplier" type="text" placeholder="请输入客户名称" /></label>
          <label class="order-edit-field"><span>订单日期 *</span><input class="input" id="edit-order-date" type="date" /></label>
          <label class="order-edit-field"><span>运费(¥)</span><input class="input" id="edit-shipping-cost" type="number" min="0" step="0.01" value="0" placeholder="请输入运费" /></label>
          <label class="order-edit-field"><span>订单状态</span><select id="edit-order-status">
            <option value="pending">待处理</option>
            <option value="completed">已完成</option>
            <option value="cancelled">已取消</option>
          </select></label>
        </div>
        <div class="filters edit-order-field-grid">
          <label class="order-edit-field order-edit-wide"><span>销售备注</span><input class="input" id="edit-notes" type="text" placeholder="请输入销售备注" /></label>
          <label class="order-edit-field"><span>卖方名称</span><input class="input" id="edit-seller-name" type="text" placeholder="请输入卖方名称" /></label>
          <label class="order-edit-field"><span>卖方电话</span><input class="input" id="edit-seller-phone" type="text" placeholder="请输入卖方电话" /></label>
        </div>
        <div class="filters edit-order-field-grid">
          <label class="order-edit-field order-edit-wide"><span>卖方地址</span><input class="input" id="edit-seller-address" type="text" placeholder="请输入卖方地址" /></label>
          <label class="order-edit-field"><span>卖方税号</span><input class="input" id="edit-seller-taxno" type="text" placeholder="请输入卖方税号" /></label>
          <label class="order-edit-field"><span>卖方备注</span><input class="input" id="edit-seller-note" type="text" placeholder="请输入卖方备注" /></label>
        </div>
        <div class="table-container">
          <table class="data-table">
            <thead><tr><th>产品</th><th>销售说明</th><th>数量</th><th>单位</th><th>销售单价</th><th>操作</th></tr></thead>
            <tbody id="edit-order-items-body"></tbody>
          </table>
        </div>
        <div class="form-actions" style="justify-content:flex-start;">
          <button id="add-edit-item-row" class="btn btn-secondary">添加销售明细</button>
          <button id="save-order-edit-button" class="btn btn-primary">保存销售订单</button>
        </div>
        <p class="message" id="edit-order-message"></p>
      </div>

      <div class="section-header order-list-header">
        <h3>销售订单列表</h3>
        <button id="open-create-order-section" class="btn btn-primary">➕ 添加销售订单</button>
      </div>
      <div class="filters order-list-filters">
        <select id="status-select" style="min-width: 120px;">
          <option value="">所有状态</option>
          <option value="pending">待处理</option>
          <option value="completed">已完成</option>
          <option value="cancelled">已取消</option>
        </select>
        <input class="input" id="supplier-search-input" type="text" placeholder="按客户搜索" style="width: 200px;" />
        <input class="input" id="product-search-input" type="text" placeholder="按产品名称搜索" style="width: 200px;" />
        <button id="search-button" class="btn btn-primary">🔍 查询</button>
        <button id="reset-button" class="btn btn-secondary">重置</button>
      </div>
      <div class="table-container order-list-table">
        <table class="data-table">
          <thead><tr><th>订单号</th><th>客户</th><th>日期</th><th>金额</th><th>状态</th><th>处理</th><th>操作</th></tr></thead>
          <tbody id="orders-body"></tbody>
        </table>
      </div>
      <p class="message" id="page-message"></p>
    </section>
  </main>

  <footer class="page-footer">
    <div class="footer-content">
      <p>&copy; 2025 库存管理系统. 保留所有权利.</p>
      <div class="footer-links">
        <a href="javascript:void(0)">隐私政策</a>
        <a href="javascript:void(0)">使用条款</a>
        <a href="javascript:void(0)">联系我们</a>
      </div>
    </div>
  </footer>

  <script>window.ORDER_PAGE_TYPE = 'sales';</script>
  <script type="module" src="/static/assets/js/orders-page.js?v=2026051308"></script>
</body>
</html>
