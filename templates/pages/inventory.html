<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>库存管理 - 库存管理系统</title>
  <link rel="stylesheet" href="/static/assets/css/styles.css?v=2026062304" />
</head>
<body>
  <header class="site-header">
    <div class="header-content">
      <div>
        <h1>库存管理</h1>
        <p>库存清单、预警状态与盘点流程统一管理</p>
      </div>
      <div class="status" id="page-status">准备加载...</div>
    </div>
  </header>
  <nav class="main-nav" id="main-nav"></nav>
  <main class="layout main-content inventory-page">
    <section class="grid two-col">
      <article class="card stat-card"><div class="stat-icon">📦</div><div><p id="stat-total-products" class="stat-value">-</p><p class="stat-label">总产品数</p></div></article>
      <article class="card stat-card"><div class="stat-icon">💰</div><div><p id="stat-total-value" class="stat-value">-</p><p class="stat-label">库存总值</p></div></article>
      <article class="card stat-card"><div class="stat-icon">📥</div><div><p id="stat-today-incoming" class="stat-value">-</p><p class="stat-label">今日入库</p></div></article>
      <article class="card stat-card"><div class="stat-icon">📤</div><div><p id="stat-today-outgoing" class="stat-value">-</p><p class="stat-label">今日出库</p></div></article>
    </section>

    <section class="section" style="margin-top:16px;">
      <div class="section-header"><h3>库存列表</h3></div>
      <div class="filters inventory-toolbar">
        <div class="inventory-toolbar-search-wrap">
          <input class="input inventory-search-input" id="search-input" type="search" placeholder="按名称 / SKU 搜索产品" />
        </div>
        <div class="inventory-toolbar-filter-wrap">
          <select id="category-select" class="inventory-compact-select"><option value="">全部分类</option></select>
        </div>
        <button id="search-button" class="btn btn-primary inventory-search-button">查询</button>
      </div>
      <div class="table-container">
        <table class="data-table">
          <thead>
            <tr><th><input type="checkbox" id="select-all"></th><th>SKU</th><th>产品名称</th><th>分类</th><th>库存</th><th>最低库存</th><th>单价</th><th>库存价值</th><th>状态</th></tr>
          </thead>
          <tbody id="inventory-body"></tbody>
        </table>
      </div>
      <div class="form-actions" style="justify-content:flex-start; margin-top:16px;">
        <button id="open-check-button" class="btn btn-primary">对选中产品执行库存盘点</button>
        <span id="selected-count" class="message">已选 0 项</span>
      </div>
      <div id="inventory-check-panel" class="card" style="display:none; margin-top:16px;">
        <div class="section-header"><h3>库存盘点</h3></div>
        <p>输入实际库存后提交，系统会按差异生成调整。</p>
        <div class="table-container">
          <table class="data-table">
            <thead><tr><th>产品</th><th>系统库存</th><th>实际库存</th><th>差异</th></tr></thead>
            <tbody id="check-body"></tbody>
          </table>
        </div>
        <div class="form-actions" style="justify-content:flex-start;">
          <button id="submit-check-button" class="btn btn-primary">提交盘点</button>
          <button id="cancel-check-button" type="button" class="btn btn-secondary">取消</button>
        </div>
      </div>
      <p class="message" id="page-message"></p>
    </section>
  </main>
  <footer class="page-footer">
    <div class="footer-content">
      <p>&copy; 2025 库存管理系统. 保留所有权利.</p>
      <div class="footer-links"><a href="javascript:void(0)">隐私政策</a><a href="javascript:void(0)">使用条款</a><a href="javascript:void(0)">联系我们</a></div>
    </div>
  </footer>
  <script type="module" src="/static/assets/js/inventory.js?v=2026051401"></script>
</body>
</html>
