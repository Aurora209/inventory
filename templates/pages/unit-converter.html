<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>单位换算 - 库存管理系统</title>
  <link rel="stylesheet" href="/static/assets/css/styles.css?v=2026062304" />
</head>
<body>
  <header class="site-header"><div class="header-content"><div><h1>单位换算器</h1><p>国际通用单位与产品自定义单位换算</p></div><div class="status" id="page-status">本地计算</div></div></header>
  <nav class="main-nav" id="main-nav"></nav>
  <main class="layout main-content unit-converter-page">
    <section class="section">
      <div class="section-header"><h3>国际通用单位转换</h3><div class="filters compact" id="unit-tabs"></div></div>
      <div class="grid two-col">
        <article class="card">
          <div class="form-grid">
            <label><span>数值</span><input class="input" id="unit-value" type="number" value="1" step="any" placeholder="输入数值" /></label>
            <label><span>从单位</span><select id="unit-from"></select></label>
            <label><span>转换为</span><select id="unit-to"></select></label>
            <div class="form-actions"><button id="unit-swap" class="btn btn-secondary" type="button">🔄 交换单位</button></div>
          </div>
          <div class="metric-card" style="margin-top:16px;"><div class="metric-label">转换结果</div><div class="metric-value" id="unit-result">-</div><p class="message" id="unit-formula"></p></div>
        </article>
        <article class="card"><h4>常用转换参考</h4><div class="reference-grid" id="unit-reference"></div></article>
      </div>
    </section>

    <section class="section">
      <div class="section-header"><h3>产品自定义单位转换</h3><div class="filters compact"><select id="custom-product-select"><option value="">选择产品</option></select><button id="open-rule-modal" class="btn btn-primary" type="button">➕ 添加转换规则</button></div></div>
      <div class="grid two-col">
        <article class="card"><h4 id="rules-title">转换规则</h4><div id="custom-rules-list" class="stack-list"></div></article>
        <article class="card"><h4>自定义转换计算</h4><div class="form-grid"><label><span>数值</span><input class="input" id="custom-value" type="number" value="1" step="any" /></label><label><span>从单位</span><select id="custom-from"><option value="">选择单位</option></select></label><label><span>转换为</span><select id="custom-to"><option value="">选择单位</option></select></label></div><div class="metric-card" style="margin-top:16px;"><div class="metric-label">转换结果</div><div class="metric-value" id="custom-result">请选择产品和单位</div></div></article>
      </div>
      <p class="message" id="page-message"></p>
    </section>

    <div class="modal-overlay fullscreen" id="rule-modal" style="display:none;"><div class="modal-content" style="width:100vw; height:100vh; max-width:none; max-height:none; border-radius:0; overflow:hidden; "><div class="modal-header"><h3 id="rule-modal-title">添加自定义转换</h3><button id="close-rule-modal" class="modal-close">×</button></div><div class="modal-body"><div class="form-grid"><label><span>选择产品 *</span><select id="rule-product"></select></label><label><span>源单位 *</span><input class="input" id="rule-from" placeholder="例如：箱" /></label><label><span>目标单位 *</span><input class="input" id="rule-to" placeholder="例如：个" /></label><label><span>转换率 *</span><input class="input" id="rule-rate" type="number" step="any" min="0.0001" value="1" /></label><label class="full-width"><span>规则描述</span><textarea class="input" id="rule-desc" rows="2" placeholder="可选"></textarea></label></div><p class="message" id="rule-preview"></p><div class="form-actions"><button id="cancel-rule" class="btn btn-secondary" type="button">取消</button><button id="save-rule" class="btn btn-primary" type="button">保存规则</button></div></div></div></div>
  </main>
  <footer class="page-footer"><div class="footer-content"><p>&copy; 2025 库存管理系统. 保留所有权利.</p><div class="footer-links"><a href="javascript:void(0)">隐私政策</a><a href="javascript:void(0)">使用条款</a><a href="javascript:void(0)">联系我们</a></div></div></footer>
  <script type="module" src="/static/assets/js/unit-converter.js?v=2026051301"></script>
</body>
</html>
